<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelflow — Корзина задач</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <span class="brand-dot"></span>
        <span class="breadcrumb">
          <a href="https://app.spelflow.ru" target="_blank" class="breadcrumb-root">Spelflow</a>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current">Корзина задач</span>
        </span>
      </div>
      <div class="header-actions">
        <div id="workspace-selector" class="selector-group hidden">
          <select id="sel-workspace" class="select"></select>
          <select id="sel-project" class="select"></select>
        </div>
        <button id="btn-import-all" class="btn-primary" disabled>Импортировать все</button>
        <button id="btn-clear" class="btn-danger">Очистить</button>
      </div>
    </header>

    <div id="state-empty" class="empty-state hidden">
      <div class="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h4"/>
        </svg>
      </div>
      <p class="empty-title">Корзина пуста</p>
      <p class="empty-hint">Перейдите на GitHub и нажмите «Capture to Spelflow» на задаче.</p>
    </div>

    <div id="state-not-connected" class="empty-state hidden">
      <div class="empty-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/>
        </svg>
      </div>
      <p class="empty-title">Нет подключения</p>
      <p class="empty-hint">Откройте popup расширения и подключитесь к Spelflow.</p>
    </div>

    <div id="issue-list" class="issue-list"></div>
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
