<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelflow Importer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="state-connected" class="hidden">
      <div class="account-row">
        <span class="dot connected"></span>
        <span id="account-name" class="account-name"></span>
      </div>
      <p id="basket-count" class="basket-count"></p>
      <button id="btn-open-review" class="btn-primary">Open Review Tab</button>
      <button id="btn-disconnect" class="btn-secondary">Disconnect</button>
    </div>
    <div id="state-disconnected">
      <p class="hint">Connect to Spelflow to start capturing issues.</p>
      <button id="btn-connect" class="btn-primary">Connect to Spelflow</button>
    </div>
    <div id="state-loading" class="hidden">
      <p class="hint">Connecting...</p>
    </div>
    <div id="state-error" class="hidden">
      <p id="error-message" class="error"></p>
      <button id="btn-retry" class="btn-secondary">Try again</button>
    </div>
  </div>
  <script type="module" src="main.ts"></script>
</body>
</html>
